    let answers = [];
    let domainScores = {
      "調剤エラー防止": 0,
      "副作用モニタリング": 0,
      "相互作用チェック": 0,
      "ヒヤリハット分析": 0,
      "インシデント報告": 0
    };
    
    function showQuestion() {
      const container = document.getElementById('questionContainer');
      const q = questions[currentQuestionIndex];
      
      let optionsHtml = q.options.map((opt, idx) => 
        `<div class="option" onclick="selectOption(${idx})" data-index="${idx}">${opt.text}</div>`
      ).join('');
      
      container.innerHTML = `
        <div class="category-label">${q.domain}</div>
        <div class="question-number">質問 ${currentQuestionIndex + 1} / 20</div>
        <div class="question-text">${q.question}</div>
        <div class="options">${optionsHtml}</div>
      `;
      
      updateProgress();
    }
    
    function selectOption(index) {
      const options = document.querySelectorAll('.option');
      options.forEach(opt => opt.classList.remove('selected'));
      options[index].classList.add('selected');
      
      const q = questions[currentQuestionIndex];
      answers[currentQuestionIndex] = q.options[index].score;
      domainScores[q.domain] += q.options[index].score;
      
      setTimeout(() => {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
          showQuestion();
        } else {
          showResult();
        }
      }, 500);
    }
    
    function updateProgress() {
      const percent = Math.round((currentQuestionIndex / questions.length) * 100);
      document.getElementById('progressFill').style.width = percent + '%';
      document.getElementById('progressFill').textContent = percent + '%';
      document.getElementById('currentQuestion').textContent = currentQuestionIndex;
    }
    
    function showResult() {
      document.getElementById('questionContainer').style.display = 'none';
      document.querySelector('.progress-container').style.display = 'none';
      
      const resultContainer = document.getElementById('resultContainer');
      resultContainer.style.display = 'block';
      
      const totalScore = answers.reduce((sum, score) => sum + score, 0);
      const maxScore = questions.length * 4;
      const percentScore = Math.round((totalScore / maxScore) * 100);
      
      document.getElementById('totalScore').textContent = percentScore + '点';
      
      let level, description;
      if (percentScore >= 85) {
        level = "🏆 医療安全リーダーレベル";
        description = "非常に高い医療安全レベルです。他薬局のモデルケースとして情報発信を検討してください。";
      } else if (percentScore >= 70) {
        level = "✅ 医療安全管理レベル";
        description = "高い医療安全レベルです。一部領域の強化でさらに向上可能です。";
      } else if (percentScore >= 55) {
        level = "📈 医療安全強化レベル";
        description = "基礎的な医療安全体制があります。優先領域の改善で大きく向上できます。";
      } else if (percentScore >= 40) {
        level = "⚠️ 医療安全基礎レベル";
        description = "医療安全体制の基礎構築が必要です。優先的に改善に取り組んでください。";
      } else {
        level = "🚨 医療安全早急改善レベル";
        description = "医療安全体制の早急な構築が必要です。外部専門家の活用も検討してください。";
      }
      
      document.getElementById('resultLevel').textContent = level;
      document.getElementById('resultDescription').textContent = description;
      
      // 領域スコア表示
      let domainHtml = '';
      const domainNames = Object.keys(domainScores);
      domainNames.forEach(domain => {
        const score = domainScores[domain];
        const maxDomainScore = 16; // 4問 × 4点
        const percent = Math.round((score / maxDomainScore) * 100);
        domainHtml += `
          <div class="domain-score">
            <div class="domain-name">${domain}</div>
            <div class="domain-value">${percent}%</div>
            <div class="domain-bar">
              <div class="domain-bar-fill" style="width: ${percent}%"></div>
            </div>
          </div>
        `;
      });
      document.getElementById('domainScores').innerHTML = domainHtml;
      
      // 改善提案（スコアが低い領域から優先表示）
      const sortedDomains = domainNames.sort((a, b) => domainScores[a] - domainScores[b]);
      let improvementHtml = '';
      sortedDomains.slice(0, 3).forEach(domain => {
        const domainImprove = improvements[domain];
        improvementHtml += `<li><strong>${domain}:</strong> ${domainImprove[0]}</li>`;
      });
      document.getElementById('improvementList').innerHTML = improvementHtml;
      
      // スクロール
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    // 初期化
    showQuestion();
  </script>
</body>
</html>
