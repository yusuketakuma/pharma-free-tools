    <script>
        // Questions Data
        const questions = [
            // 臨床志向 (Q1-Q5)
            { id: 1, category: 'clinical', text: '患者さんとの対話で、病状や生活背景を深く掘り下げるのは好きですか？', options: ['とても好き', 'まあ好き', 'どちらとも言えない', 'あまり好きではない', '全く好きではない'] },
            { id: 2, category: 'clinical', text: '新しい薬の作用機序や臨床データを調べるのは楽しいですか？', options: ['とても楽しい', 'まあ楽しい', 'どちらとも言えない', 'あまり楽しくない', '全く楽しくない'] },
            { id: 3, category: 'clinical', text: '複雑な処方に対して、最適な提案を考えるのは得意ですか？', options: ['とても得意', 'まあ得意', 'どちらとも言えない', 'あまり得意ではない', '全く得意ではない'] },
            { id: 4, category: 'clinical', text: '在宅医療や緩和ケアなど、専門性の高い分野に興味がありますか？', options: ['強く興味がある', 'やや興味がある', 'どちらとも言えない', 'あまり興味がない', '全く興味がない'] },
            { id: 5, category: 'clinical', text: '医学会や研修会に積極的に参加したいと思いますか？', options: ['積極的に参加したい', '機会があれば参加したい', 'どちらとも言えない', 'あまり参加したくない', '全く参加したくない'] },

            // 管理志向 (Q6-Q10)
            { id: 6, category: 'management', text: 'チームをまとめたり、方針を決める役割は好きですか？', options: ['とても好き', 'まあ好き', 'どちらとも言えない', 'あまり好きではない', '全く好きではない'] },
            { id: 7, category: 'management', text: '業務フローの改善や効率化を考えるのは得意ですか？', options: ['とても得意', 'まあ得意', 'どちらとも言えない', 'あまり得意ではない', '全く得意ではない'] },
            { id: 8, category: 'management', text: '後輩の指導・育成にやりがいを感じますか？', options: ['強く感じる', 'やや感じる', 'どちらとも言えない', 'あまり感じない', '全く感じない'] },
            { id: 9, category: 'management', text: '数字やKPIを分析して戦略を立てるのは好きですか？', options: ['とても好き', 'まあ好き', 'どちらとも言えない', 'あまり好きではない', '全く好きではない'] },
            { id: 10, category: 'management', text: '将来的に管理職や経営に関わりたいと思いますか？', options: ['強く思う', 'やや思う', 'どちらとも言えない', 'あまり思わない', '全く思わない'] },

            // 研究志向 (Q11-Q15)
            { id: 11, category: 'research', text: '新しい知識を体系化したり、論文を書くのは好きですか？', options: ['とても好き', 'まあ好き', 'どちらとも言えない', 'あまり好きではない', '全く好きではない'] },
            { id: 12, category: 'research', text: 'データを分析して、傾向や課題を発見するのは得意ですか？', options: ['とても得意', 'まあ得意', 'どちらとも言えない', 'あまり得意ではない', '全く得意ではない'] },
            { id: 13, category: 'research', text: '学会発表や論文執筆に興味がありますか？', options: ['強く興味がある', 'やや興味がある', 'どちらとも言えない', 'あまり興味がない', '全く興味がない'] },
            { id: 14, category: 'research', text: '専門分野を深く追求し続けることは魅力的ですか？', options: ['とても魅力的', 'まあ魅力的', 'どちらとも言えない', 'あまり魅力的ではない', '全く魅力的ではない'] },
            { id: 15, category: 'research', text: '大学や研究機関での勤務に関心がありますか？', options: ['強い関心がある', 'やや関心がある', 'どちらとも言えない', 'あまり関心がない', '全く関心がない'] },

            // 起業・独立志向 (Q16-Q20)
            { id: 16, category: 'entrepreneur', text: '新しいサービスやビジネスアイデアを考えるのは好きですか？', options: ['とても好き', 'まあ好き', 'どちらとも言えない', 'あまり好きではない', '全く好きではない'] },
            { id: 17, category: 'entrepreneur', text: 'リスクを取ってでも新しいことに挑戦したいですか？', options: ['積極的に挑戦したい', '機会があれば挑戦したい', 'どちらとも言えない', 'あまり挑戦したくない', '全く挑戦したくない'] },
            { id: 18, category: 'entrepreneur', text: '自分のスキルや知識を商品化することに興味がありますか？', options: ['強く興味がある', 'やや興味がある', 'どちらとも言えない', 'あまり興味がない', '全く興味がない'] },
            { id: 19, category: 'entrepreneur', text: 'SNSやブログで情報発信をするのは好きですか？', options: ['とても好き', 'まあ好き', 'どちらとも言えない', 'あまり好きではない', '全く好きではない'] },
            { id: 20, category: 'entrepreneur', text: '将来的に独立・起業を考えていますか？', options: ['強く考えている', 'やや考えている', 'どちらとも言えない', 'あまり考えていない', '全く考えていない'] }
        ];

        // Career paths data
        const careerPaths = {
            clinical: {
                name: '臨床専門職',
                description: '患者ケアの最前線で専門性を発揮',
                paths: ['認定薬剤師・専門薬剤師への道', '在宅医療専門薬剤師', '病院臨床薬剤師', '緩和ケア認定薬剤師'],
                skills: ['高度な薬学知識', '患者コミュニケーション', '臨床判断力', 'チーム医療']
            },
            management: {
                name: '管理・経営',
                description: '組織運営と人材育成をリード',
                paths: ['薬局長・店長', 'エリアマネージャー', '薬局経営者', '医療機関管理者'],
                skills: ['リーダーシップ', '組織運営', '財務・戦略', '人材育成']
            },
            research: {
                name: '研究・教育',
                description: '知のフロンティアを開拓',
                paths: ['大学教員', '製薬企業研究職', '臨床研究コーディネーター', '医学系専門誌編集者'],
                skills: ['研究設計', 'データ分析', '論文執筆', 'プレゼンテーション']
            },
            entrepreneur: {
                name: '起業・独立',
                description: '新しい価値を創造する',
                paths: ['薬局開業', 'コンサルタント', '医療系メディア運営', '教育・研修事業'],
                skills: ['ビジネス企画', 'マーケティング', '資金調達', 'リスク管理']
            }
        };

        // State
        let currentQuestion = 0;
        let answers = {};

        // Initialize
        function init() {
            renderQuestion();
        }

        // Render question
        function renderQuestion() {
            const q = questions[currentQuestion];
            const container = document.getElementById('questionContainer');

            const categoryLabels = {
                clinical: '臨床志向',
                management: '管理志向',
                research: '研究志向',
                entrepreneur: '起業・独立志向'
            };

            let optionsHtml = q.options.map((opt, idx) => {
                const score = 5 - idx;
                const checked = answers[q.id] === score ? 'checked' : '';
                return `
                    <label class="block p-4 border rounded-lg cursor-pointer hover:bg-blue-50 transition ${checked ? 'bg-blue-100 border-blue-500' : 'border-gray-200'}">
                        <input type="radio" name="q${q.id}" value="${score}" ${checked} onchange="selectAnswer(${q.id}, ${score})" class="mr-3">
                        ${opt}
                    </label>
                `;
            }).join('');

            container.innerHTML = `
                <div class="mb-4">
                    <span class="text-sm text-blue-600 font-medium">${categoryLabels[q.category]}</span>
                    <span class="text-sm text-gray-400 ml-2">質問 ${q.id} / 20</span>
                </div>
                <h2 class="text-xl font-bold text-gray-800 mb-6">${q.text}</h2>
                <div class="space-y-3">
                    ${optionsHtml}
                </div>
            `;

            updateProgress();
            updateNavButtons();
        }

        // Select answer
        function selectAnswer(questionId, score) {
            answers[questionId] = score;
            renderQuestion();
            document.getElementById('nextBtn').disabled = false;
        }

        // Update progress
        function updateProgress() {
            const answered = Object.keys(answers).length;
            const total = questions.length;
            const percent = (answered / total) * 100;

            document.getElementById('progressText').textContent = `${answered} / ${total}`;
            document.getElementById('progressBar').style.width = `${percent}%`;
        }

        // Update navigation buttons
        function updateNavButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            prevBtn.classList.toggle('hidden', currentQuestion === 0);

            if (currentQuestion === questions.length - 1) {
                nextBtn.textContent = '診断結果を見る';
            } else {
                nextBtn.textContent = '次へ →';
            }

            nextBtn.disabled = !answers[questions[currentQuestion].id];
        }

        // Next question
        function nextQuestion() {
            if (!answers[questions[currentQuestion].id]) return;

            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResults();
            }
        }

        // Previous question
        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
            }
        }

        // Calculate results
        function calculateResults() {
            const scores = {
                clinical: 0,
                management: 0,
                research: 0,
                entrepreneur: 0
            };

            const counts = {
                clinical: 0,
                management: 0,
                research: 0,
                entrepreneur: 0
            };

            questions.forEach(q => {
                if (answers[q.id]) {
                    scores[q.category] += answers[q.id];
                    counts[q.category]++;
                }
            });

            // Calculate averages
            const averages = {};
            for (let cat in scores) {
                averages[cat] = counts[cat] > 0 ? (scores[cat] / counts[cat]).toFixed(1) : 0;
            }

            // Find top categories
            const sorted = Object.entries(averages).sort((a, b) => b[1] - a[1]);
            const topCategory = sorted[0][0];
            const secondCategory = sorted[1][0];

            return { scores, averages, sorted, topCategory, secondCategory };
        }

        // Show results
        function showResults() {
            const results = calculateResults();
            const container = document.getElementById('resultContainer');
            const questionContainer = document.getElementById('questionContainer');
            const navButtons = document.getElementById('navButtons');
            const progressContainer = document.getElementById('progressContainer');
            const ctaSection = document.getElementById('ctaSection');

            // Hide question elements
            questionContainer.classList.add('hidden');
            navButtons.classList.add('hidden');
            progressContainer.classList.add('hidden');

            // Build result HTML
            const categoryLabels = {
                clinical: { name: '臨床専門職', icon: '🩺', color: 'blue' },
                management: { name: '管理・経営', icon: '📊', color: 'green' },
                research: { name: '研究・教育', icon: '🔬', color: 'purple' },
                entrepreneur: { name: '起業・独立', icon: '🚀', color: 'orange' }
            };

            const topPath = careerPaths[results.topCategory];
            const secondPath = careerPaths[results.secondCategory];

            let scoresHtml = results.sorted.map(([cat, score]) => {
                const info = categoryLabels[cat];
                const percent = (score / 5) * 100;
                return `
                    <div class="mb-4">
                        <div class="flex justify-between mb-1">
                            <span class="font-medium">${info.icon} ${info.name}</span>
                            <span class="text-gray-600">${score} / 5.0</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-3">
                            <div class="bg-${info.color}-500 h-3 rounded-full" style="width: ${percent}%"></div>
                        </div>
                    </div>
                `;
            }).join('');

            let pathsHtml = topPath.paths.map(p => `<li class="py-1">✓ ${p}</li>`).join('');

            container.innerHTML = `
                <div class="result-card">
                    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">🎯 診断結果</h2>

                    <!-- Score Summary -->
                    <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                        <h3 class="font-bold text-lg mb-4">適性スコア</h3>
                        ${scoresHtml}
                    </div>

                    <!-- Top Career Path -->
                    <div class="bg-gradient-to-r from-blue-500 to-purple-600 text-white rounded-lg shadow-md p-6 mb-6">
                        <h3 class="font-bold text-xl mb-2">あなたに最適なキャリアパス</h3>
                        <p class="text-2xl font-bold mb-2">${categoryLabels[results.topCategory].icon} ${topPath.name}</p>
                        <p class="opacity-90 mb-4">${topPath.description}</p>
                        <h4 class="font-bold mb-2">推奨キャリア:</h4>
                        <ul class="space-y-1">
                            ${pathsHtml}
                        </ul>
                    </div>

                    <!-- Recommended Skills -->
                    <div class="bg-white rounded-lg shadow-md p-6 mb-6">
                        <h3 class="font-bold text-lg mb-4">身につけるべきスキル</h3>
                        <div class="grid grid-cols-2 gap-3">
                            ${topPath.skills.map(s => `<span class="bg-blue-100 text-blue-800 px-3 py-2 rounded-lg text-center">${s}</span>`).join('')}
                        </div>
                    </div>

                    <!-- Second Best Path -->
                    <div class="bg-gray-100 rounded-lg p-6 mb-6">
                        <h3 class="font-bold text-lg mb-2">次点: ${categoryLabels[results.secondCategory].icon} ${secondPath.name}</h3>
                        <p class="text-gray-600 text-sm mb-3">${secondPath.description}</p>
                        <ul class="text-sm text-gray-700">
                            ${secondPath.paths.slice(0, 2).map(p => `<li>• ${p}</li>`).join('')}
                        </ul>
                    </div>

                    <!-- Action Buttons -->
                    <div class="flex justify-center gap-4">
                        <button onclick="trackToolUsage('reset'); location.reload()" class="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
                            もう一度診断する
                        </button>
                        <button onclick="trackCopyAction(); copyResults()" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                            結果をコピー
                        </button>
                    </div>
                </div>
            `;

            container.classList.remove('hidden');
            ctaSection.classList.remove('hidden');
        }

        // Copy results
        function copyResults() {
            const results = calculateResults();
            const categoryLabels = {
                clinical: '臨床専門職',
                management: '管理・経営',
                research: '研究・教育',
                entrepreneur: '起業・独立'
            };

            const text = `【薬剤師キャリア診断結果】

最適なキャリアパス: ${categoryLabels[results.topCategory]}
スコア: ${results.averages[results.topCategory]} / 5.0

適性スコア一覧:
${results.sorted.map(([cat, score]) => `${categoryLabels[cat]}: ${score}`).join('\n')}

診断ツール: https://yusuketakuma.github.io/pharma-free-tools/pharmacist-career-diagnosis.html`;

            navigator.clipboard.writeText(text).then(() => {
                alert('診断結果をコピーしました！');
            });
        }

        // Initialize on load
        init();
    </script>
