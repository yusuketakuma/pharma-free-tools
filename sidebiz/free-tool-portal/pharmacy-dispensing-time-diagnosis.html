  <script>
    const questions = [
      // 調剤プロセス (4問)
      {
        category: "調剤プロセス",
        question: "処方箋受付から調剤開始までの時間は適切ですか？",
        options: ["即座に開始できる", "5分以内", "10分以内", "15分以上かかる"]
      },
      {
        category: "調剤プロセス",
        question: "調剤棚の配置は作業効率を考慮していますか？",
        options: ["頻繁に使用する薬は手元にある", "ある程度整理されている", "やや整理が必要", "探す時間が多い"]
      },
      {
        category: "調剤プロセス",
        question: "PTPシートの取り出し作業を効率化していますか？",
        options: ["自動はがし機等を活用", "効率的な手順を確立", "通常の手作業", "時間がかかる"]
      },
      {
        category: "調剤プロセス",
        question: "一包化・散剤の調剤プロセスを最適化していますか？",
        options: ["自動包装機を活用", "効率的な手順を確立", "標準的な手順", "時間がかかる"]
      },
      // 確認作業 (4問)
      {
        category: "確認作業",
        question: "鑑査（確認）作業の効率はどうですか？",
        options: ["効率的な確認フロー確立", "標準的な確認時間", "確認に時間がかかる", "二重確認が必要なことが多い"]
      },
      {
        category: "確認作業",
        question: "疑義照会のプロセスを効率化していますか？",
        options: ["電話・FAX・電子処方箋を最適活用", "標準的な対応", "照会に時間がかかる", "照回数が多い"]
      },
      {
        category: "確認作業",
        question: "後発品切替確認の手順を標準化していますか？",
        options: ["チェックリスト活用で迅速化", "ある程度標準化", "その都度確認が必要", "手間がかかる"]
      },
      {
        category: "確認作業",
        question: "薬歴確認・相互作用チェックを効率化していますか？",
        options: ["システム活用で自動チェック", "効率的な手順確立", "標準的な確認", "時間がかかる"]
      },
      // 薬歴入力 (4問)
      {
        category: "薬歴入力",
        question: "薬歴入力の時間を短縮する取り組みをしていますか？",
        options: ["AI・音声入力活用", "テンプレート活用", "標準的な入力", "入力に時間がかかる"]
      },
      {
        category: "薬歴入力",
        question: "服薬指導内容の記録を効率化していますか？",
        options: ["録音・自動文字起こし活用", "テンプレート活用", "標準的な記録", "記録に時間がかかる"]
      },
      {
        category: "薬歴入力",
        question: "過去薬歴の参照・検索を効率化していますか？",
        options: ["キーワード検索・タグ活用", "ある程度効率的", "標準的な参照方法", "探すのに時間がかかる"]
      },
      {
        category: "薬歴入力",
        question: "在宅医療の薬歴入力を効率化していますか？",
        options: ["専用テンプレート・フォーム活用", "ある程度効率的", "標準的な入力", "入力に時間がかかる"]
      },
      // 環境要因 (4問)
      {
        category: "環境要因",
        question: "調剤室のレイアウトは作業効率を最大化していますか？",
        options: ["動線を最適化済み", "ある程度最適化", "標準的な配置", "改善の余地あり"]
      },
      {
        category: "環境要因",
        question: "在庫管理システムを効率化していますか？",
        options: ["自動発注・在庫アラート活用", "ある程度効率的", "手動管理が多い", "在庫管理に時間がかかる"]
      },
      {
        category: "環境要因",
        question: "調剤機器・自動化設備を活用していますか？",
        options: ["フル活用", "一部活用", "導入検討中", "活用していない"]
      },
      {
        category: "環境要因",
        question: "スタッフ配置・役割分担を最適化していますか？",
        options: ["効率的な分担確立", "ある程度最適化", "標準的な分担", "改善の余地あり"]
      },
      // 継続改善 (4問)
      {
        category: "継続改善",
        question: "業務時間の計測・分析を定期的に行っていますか？",
        options: ["定期的に実施", "時々実施", "ほとんど実施していない", "実施していない"]
      },
      {
        category: "継続改善",
        question: "業務改善のアイデアを収集・検討していますか？",
        options: ["定例会議・提案制度あり", "時々検討", "個別に対応", "特に取り組んでいない"]
      },
      {
        category: "継続改善",
        question: "他薬局・業界の効率化事例を参考にしていますか？",
        options: ["積極的に情報収集", "時々参考にする", "興味はある", "特に参考にしていない"]
      },
      {
        category: "継続改善",
        question: "新しいツール・技術の導入に積極的ですか？",
        options: ["積極的に試している", "検討している", "様子見", "保守的"]
      }
    ];
    
    let currentQuestion = 0;
    let answers = [];
    
    function initQuiz() {
      renderQuestion();
      updateProgress();
    }
    
    function renderQuestion() {
      const container = document.getElementById('quizContainer');
      const q = questions[currentQuestion];
      
      container.innerHTML = `
        <div class="question-section active">
          <span class="category-label">${q.category}</span>
          <div class="question-number">質問 ${currentQuestion + 1} / ${questions.length}</div>
          <div class="question">${q.question}</div>
          <div class="options">
            ${q.options.map((opt, i) => `
              <div class="option" onclick="selectOption(${i})">${opt}</div>
            `).join('')}
          </div>
          <button class="btn" id="nextBtn" onclick="trackToolUsage('next'); nextQuestion()" disabled>次へ</button>
        </div>
      `;
    }
    
    function selectOption(index) {
      answers[currentQuestion] = index;
      
      document.querySelectorAll('.option').forEach((opt, i) => {
        opt.classList.toggle('selected', i === index);
      });
      
      document.getElementById('nextBtn').disabled = false;
    }
    
    function nextQuestion() {
      currentQuestion++;
      
      if (currentQuestion >= questions.length) {
        showResults();
      } else {
        renderQuestion();
        updateProgress();
      }
    }
    
    function updateProgress() {
      const progress = (currentQuestion / questions.length) * 100;
      document.getElementById('progressFill').style.width = progress + '%';
    }
    
    function calculateResults() {
      const categoryScores = {};
      const categories = [...new Set(questions.map(q => q.category))];
      
      categories.forEach(cat => {
        categoryScores[cat] = 0;
      });
      
      answers.forEach((answer, index) => {
        const category = questions[index].category;
        categoryScores[category] += (3 - answer) * 5; // 0=15点, 1=10点, 2=5点, 3=0点
      });
      
      // 各カテゴリの最大点数は20点 (4問 × 5点)
      Object.keys(categoryScores).forEach(cat => {
        categoryScores[cat] = Math.round((categoryScores[cat] / 60) * 100);
      });
      
      const totalScore = Math.round(
        Object.values(categoryScores).reduce((a, b) => a + b, 0) / categories.length
      );
      
      return { categoryScores, totalScore };
    }
    
    function getLevel(score) {
      if (score >= 80) return { text: '効率化達成', class: 'level-expert' };
      if (score >= 60) return { text: '改善進行中', class: 'level-advanced' };
      if (score >= 40) return { text: '改善余地あり', class: 'level-developing' };
      return { text: '改善必要', class: 'level-beginner' };
    }
    
    function getRecommendations(categoryScores) {
      const recommendations = [];
      
      if (categoryScores['調剤プロセス'] < 60) {
        recommendations.push('調剤棚の配置を見直し、頻繁に使用する薬を手元に配置');
        recommendations.push('PTPシート取り出し作業の効率化（自動はがし機等の導入検討）');
      }
      
      if (categoryScores['確認作業'] < 60) {
        recommendations.push('疑義照会プロセスの標準化・テンプレート化');
        recommendations.push('相互作用チェックの自動化システム活用');
      }
      
      if (categoryScores['薬歴入力'] < 60) {
        recommendations.push('薬歴入力テンプレートの活用・カスタマイズ');
        recommendations.push('AI音声入力・自動文字起こしの導入検討');
      }
      
      if (categoryScores['環境要因'] < 60) {
        recommendations.push('調剤室レイアウトの動線最適化');
        recommendations.push('在庫管理システムの自動発注機能活用');
      }
      
      if (categoryScores['継続改善'] < 60) {
        recommendations.push('業務時間計測の定期実施（週1回〜月1回）');
        recommendations.push('業務改善アイデアの収集・検討会の設置');
      }
      
      if (recommendations.length === 0) {
        recommendations.push('現在の効率化レベルを維持しつつ、さらなる改善を継続');
        recommendations.push('他薬局・業界の効率化事例を積極的に情報収集');
      }
      
      return recommendations;
    }
    
    function showResults() {
      const { categoryScores, totalScore } = calculateResults();
      const level = getLevel(totalScore);
      const recommendations = getRecommendations(categoryScores);
      
      document.getElementById('quizContainer').style.display = 'none';
      const resultsSection = document.getElementById('resultsSection');
      resultsSection.classList.add('active');
      
      resultsSection.innerHTML = `
        <div class="total-score">
          <div class="score-circle">
            <div class="score-number">${totalScore}</div>
            <div class="score-label">/ 100点</div>
          </div>
          <span class="level-badge ${level.class}">${level.text}</span>
        </div>
        
        <h3 style="text-align: center; margin-bottom: 20px;">📊 領域別スコア</h3>
        
        <div class="category-scores">
          ${Object.entries(categoryScores).map(([cat, score]) => `
            <div class="category-card">
              <h3>${cat}</h3>
              <div class="category-bar">
                <div class="category-fill" style="width: ${score}%"></div>
              </div>
              <div style="display: flex; justify-content: space-between;">
                <span>${score}点</span>
                <span>${getLevel(score).text}</span>
              </div>
            </div>
          `).join('')}

            ${recommendations.map(rec => `<li>${rec}</li>`).join('')}

          <button class="restart-btn" onclick="trackToolUsage('reset'); restartQuiz()">もう一度診断する</button>
        </div>
      `;
      
      document.getElementById('progressFill').style.width = '100%';
    }
    
    function restartQuiz() {
      currentQuestion = 0;
      answers = [];
      document.getElementById('resultsSection').classList.remove('active');
      document.getElementById('resultsSection').innerHTML = '';
      document.getElementById('quizContainer').style.display = 'block';
      initQuiz();
    }
    
    // Initialize
    initQuiz();
  </script>
