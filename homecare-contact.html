  <script>
    const STORAGE_KEY = 'homecare-contact-data';

    // SharedPatientStore
    const SharedPatientStore = {
      KEY: "homecare-shared-patients",
      getAll() { return JSON.parse(localStorage.getItem(this.KEY) || "[]"); },
      save(patients) { localStorage.setItem(this.KEY, JSON.stringify(patients)); },
      getById(id) { return this.getAll().find(p => p.id === id); },
      upsert(patient) {
        const patients = this.getAll();
        const idx = patients.findIndex(p => p.id === patient.id);
        if (idx >= 0) { patients[idx] = { ...patients[idx], ...patient, updatedAt: new Date().toISOString() }; }
        else { patients.push({ ...patient, id: patient.id || "p_" + Date.now(), createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() }); }
        this.save(patients);
        return patients;
      },
      populateSelector(selectEl, onSelect) {
        const patients = this.getAll();
        selectEl.innerHTML = "<option value=''>-- 患者を選択 --</option><option value='__new__'>+ 新規患者</option>";
        patients.forEach(p => { const opt = document.createElement("option"); opt.value = p.id; opt.textContent = p.name + " (" + p.age + "歳)"; selectEl.appendChild(opt); });

ご多忙のところ恐縮ですが、ご検討いただけますと幸いです。

${d.pharmacyName} 薬剤師 ${d.pharmacistName}`
      },
      discharge: {
        basic: (d) =>
`【退院時薬剤調整のご依頼】
${d.doctorName}先生

患者：${d.patientName}様（${d.age}歳）

退院に際し、以下の薬剤調整についてご相談させていただきます。

■ 入院前の処方：${d.content}
■ 退院時の処方：
■ 調整が必要な事項：

ご確認・ご指示のほど、よろしくお願い申し上げます。

${d.pharmacyName} 薬剤師 ${d.pharmacistName}`,
        detail: (d) =>
`【退院時薬剤調整のご依頼】
${d.doctorName}先生

患者：${d.patientName}様（${d.age}歳）

退院に際し、以下の薬剤調整についてご相談させていただきます。

■ 入院前の処方：${d.content}
■ 退院時の処方：
■ 調整が必要な事項：

■ 在宅での管理上の注意点：


■ ケアチームへの共有事項：


円滑な在宅復帰に向けてご協力よろしくお願い申し上げます。

${d.pharmacyName} 薬剤師 ${d.pharmacistName}`
      }
    };

    const CONTENT_LABELS = {
      inquiry: '照会内容・確認事項',
      sideeffect: '被疑薬・症状の概要',
      adherence: '服薬状況の詳細',
      remaining: '残薬のある薬剤',
      change: '現在の処方内容',
      discharge: '入院前の処方内容'
    };

    let currentType = 'inquiry';
    let saveTimer;

    // ---- Save indicator ----
    function showSaveIndicator() {
      const el = document.getElementById('saveIndicator');
      el.classList.add('visible');
      clearTimeout(el._hideTimer);
      el._hideTimer = setTimeout(() => el.classList.remove('visible'), 1800);
    }

    // ---- localStorage ----
    function saveToLocalStorage() {
      const data = {
        contactType: currentType,
        pharmacyName: document.getElementById('pharmacyName').value,
        pharmacistName: document.getElementById('pharmacistName').value,
        doctorName: document.getElementById('doctorName').value,
        clinicName: document.getElementById('clinicName').value,
        patientName: document.getElementById('patientName').value,
        age: document.getElementById('age').value,
        contactDate: document.getElementById('contactDate').value,
        templateVersion: document.querySelector('input[name="templateVersion"]:checked').value,
        content: document.getElementById('content').value
      };
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        showSaveIndicator();
      } catch (e) {
        // localStorage unavailable
      }
    }

    function debouncedSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(saveToLocalStorage, 300);
    }

    function restoreFromLocalStorage() {
      let data;
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        data = JSON.parse(raw);
      } catch (e) { return; }

      if (data.contactType) {
        currentType = data.contactType;
        document.querySelectorAll('.type-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.type === currentType);
        });
        updateContentLabel();
      }
      const set = (id, val) => { if (val !== undefined && val !== null) document.getElementById(id).value = val; };
      set('pharmacyName', data.pharmacyName);
      set('pharmacistName', data.pharmacistName);
      set('doctorName', data.doctorName);
      set('clinicName', data.clinicName);
      set('patientName', data.patientName);
      set('age', data.age);
      if (data.contactDate) set('contactDate', data.contactDate);
      if (data.templateVersion) {
        const radio = document.querySelector(`input[name="templateVersion"][value="${data.templateVersion}"]`);
        if (radio) radio.checked = true;
      }
      set('content', data.content);
    }

    // ---- Type selector ----
    function updateContentLabel() {
      document.getElementById('contentLabel').textContent = CONTENT_LABELS[currentType] || '連絡内容';
      const placeholders = {
        inquiry: '確認したい処方内容や懸念点を入力してください',
        sideeffect: '副作用が疑われる薬剤名と症状の概要を入力してください',
        adherence: '服薬できていない状況や頻度を入力してください',
        remaining: '残薬が確認された薬剤名を入力してください',
        change: '現在処方されている薬剤名・用量を入力してください',
        discharge: '入院前に処方されていた薬剤を入力してください'
      };
      document.getElementById('content').placeholder = placeholders[currentType] || '内容を入力してください';
    }

    document.getElementById('typeSelector').addEventListener('click', (e) => {
      const btn = e.target.closest('.type-btn');
      if (!btn) return;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentType = btn.dataset.type;
      updateContentLabel();
      debouncedSave();
    });

    // ---- Patient selector ----
    SharedPatientStore.populateSelector(document.getElementById('patientSelector'), function(patient) {
      if (!patient) {
        document.getElementById('patientName').value = '';
        document.getElementById('age').value = '';
        document.getElementById('doctorName').value = '';
        return;
      }
      document.getElementById('patientName').value = patient.name || '';
      document.getElementById('age').value = patient.age || '';
      if (patient.doctor) document.getElementById('doctorName').value = patient.doctor;
      debouncedSave();
    });

    // ---- Generate ----
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
    }

    function generateMessage() {
      const templateVersion = document.querySelector('input[name="templateVersion"]:checked').value;
      const templateFn = TEMPLATES[currentType][templateVersion];

      const d = {
        patientName: document.getElementById('patientName').value || '【患者氏名】',
        age: document.getElementById('age').value || '【年齢】',
        date: formatDate(document.getElementById('contactDate').value) || '【日付】',
        pharmacyName: document.getElementById('pharmacyName').value || '【薬局名】',
        pharmacistName: document.getElementById('pharmacistName').value || '【薬剤師名】',
        doctorName: document.getElementById('doctorName').value || '【医師名】',
        clinicName: document.getElementById('clinicName').value || '',
        content: document.getElementById('content').value || '【内容未入力】'
      };

      const text = templateFn(d);
      document.getElementById('outputText').value = text;
      document.getElementById('outputSection').style.display = 'block';
      document.getElementById('outputSection').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ---- Actions ----
    function copyToClipboard() {
      const text = document.getElementById('outputText').value;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.copy-btn');
        const orig = btn.textContent;
        btn.textContent = 'コピーしました';
        setTimeout(() => { btn.textContent = orig; }, 1500);
      }).catch(() => {
        const ta = document.getElementById('outputText');
        ta.select();
        document.execCommand('copy');
      });
    }

    function exportAsText() {
      const text = document.getElementById('outputText').value;
      const typeLabels = {
        inquiry: '疑義照会', sideeffect: '副作用報告', adherence: 'アドヒアランス低下',
        remaining: '残薬報告', change: '処方変更提案', discharge: '退院時調整'
      };
      const label = typeLabels[currentType] || '医師連絡';
      const date = document.getElementById('contactDate').value || new Date().toISOString().slice(0, 10);
      const filename = `医師連絡_${label}_${date}.txt`;
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function printMessage() {
      window.print();
    }

    // ---- Auto-save on input ----
    document.querySelector('.container').addEventListener('input', debouncedSave);
    document.querySelector('.container').addEventListener('change', debouncedSave);

    // ---- Init ----
    restoreFromLocalStorage();
    updateContentLabel();
    if (!document.getElementById('contactDate').value) {
      document.getElementById('contactDate').valueAsDate = new Date();
    }
  </script>
</body>
</html>
