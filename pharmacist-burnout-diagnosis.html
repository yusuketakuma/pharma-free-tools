  <script>
    const SCALE = [
      { score: 0, label: "全くない" },
      { score: 1, label: "めったにない" },
      { score: 2, label: "時々ある" },
      { score: 3, label: "よくある" },
      { score: 4, label: "常にある" }
    ];

    const questions = [
      // 軸1: 感情耗尽（5問）
      { axis: "感情耗尽", text: "仕事が終わるとエネルギーを使い果たしたと感じる" },
      { axis: "感情耗尽", text: "職場で人と関わることに疲弊する" },
      { axis: "感情耗尽", text: "朝起きたとき、今日も仕事だと思うと気が重い" },
      { axis: "感情耗尽", text: "一日中患者と話し続けることが辛い" },
      { axis: "感情耗尽", text: "仕事上の問題に対して感情的に鈍くなってきた" },
      // 軸2: 脱人格化（5問）
      { axis: "脱人格化", text: "患者を症状や処方箋として扱うことが増えた" },
      { axis: "脱人格化", text: "患者の訴えに対して以前より冷めた対応をするようになった" },
      { axis: "脱人格化", text: "職場の同僚に対してイライラしやすくなった" },
      { axis: "脱人格化", text: "患者のクレームを聞くのが億劫になった" },
      { axis: "脱人格化", text: "仕事に対する使命感・やりがいが薄れてきた" },
      // 軸3: 達成感低下（5問）
      { axis: "達成感低下", text: "仕事で有意義な成果を出せていると感じない" },
      { axis: "達成感低下", text: "専門知識が患者に役立てられている実感がない" },
      { axis: "達成感低下", text: "キャリアの方向性に自信が持てない" },
      { axis: "達成感低下", text: "新しい業務や改定対応について学ぶ意欲が湧かない" },
      { axis: "達成感低下", text: "薬剤師を続けることへの誇りが以前より低下した" }
    ];

    const AXES = ["感情耗尽", "脱人格化", "達成感低下"];
    let currentQuestion = 0;
    let answers = new Array(questions.length).fill(null);

    function renderQuestions() {
      const container = document.getElementById("questions");
      container.innerHTML = questions.map((q, i) => `
        <div class="question" id="q${i}">
          <div class="axis-label">軸${AXES.indexOf(q.axis) + 1}: ${q.axis}</div>
          <h2>Q${i + 1}. ${q.text}</h2>
          <div class="options">
            ${SCALE.map(s => `
              <div class="option" onclick="selectOption(${i}, ${s.score})">
                <span class="option-score">${s.score}</span>${s.label}
              </div>
            `).join("")}
          </div>
        </div>
      `).join("");
    }

    function showQuestion(index) {
      document.querySelectorAll(".question").forEach(q => q.classList.remove("active"));
      if (index < questions.length) {
        document.getElementById(`q${index}`).classList.add("active");
        document.getElementById("progressFill").style.width = `${(index / questions.length) * 100}%`;
        document.getElementById("progressText").textContent = `質問 ${index + 1} / ${questions.length}`;
      }
    }

    function selectOption(qIndex, score) {
      answers[qIndex] = score;
      const options = document.querySelectorAll(`#q${qIndex} .option`);
      options.forEach(opt => opt.classList.remove("selected"));
      options[score].classList.add("selected");

      setTimeout(() => {
        currentQuestion = qIndex + 1;
        if (currentQuestion < questions.length) {
          showQuestion(currentQuestion);
        } else {
          showResult();
        }
      }, 260);
    }

    function computeAxisScores() {
      const result = { "感情耗尽": 0, "脱人格化": 0, "達成感低下": 0 };
      questions.forEach((q, i) => {
        result[q.axis] += answers[i] || 0;
      });
      return result;
    }

    function judgeOverall(total) {
      if (total <= 15) return { key: "green", label: "🌱 バーンアウトリスク低", card: "green" };
      if (total <= 30) return { key: "yellow", label: "⚠️ 中程度の疲弊サイン", card: "yellow" };
      if (total <= 45) return { key: "orange", label: "🔶 要注意・早期対処を", card: "orange" };
      return { key: "red", label: "🚨 バーンアウト高リスク", card: "red" };
    }

    function axisLevel(score) {
      if (score <= 5) return 0;
      if (score <= 10) return 1;
      if (score <= 14) return 2;
      return 3;
    }

    function buildAdvice(axisScores, overall) {
      const items = [];

      if (overall.key === "green") {
        items.push("現在のストレス対処は良好です。<strong>予防の視点で現在の習慣（睡眠・休息・趣味の時間）を継続</strong>してください。");
      } else if (overall.key === "yellow") {
        items.push("<strong>疲弊サインが出始めています。</strong>週1回の完全オフ日を確保し、業務外での回復時間を意図的に作ってください。");
      } else if (overall.key === "orange") {
        items.push("<strong>早期対処が必要な段階です。</strong>業務負荷の見直しと、信頼できる同僚や上司への相談を今週中に開始してください。");
      } else {
        items.push("<strong>バーンアウト高リスク状態です。</strong>産業医・メンタルクリニック等の専門家への相談を強く推奨します。放置は離職・うつ病に直結します。");
      }

      if (axisScores["感情耗尽"] >= 15) {
        items.push("【感情耗尽が高値】今すぐ有給休暇を申請してください。<strong>連続3日以上の休息</strong>が回復の第一歩です。");
      }
      if (axisScores["脱人格化"] >= 15) {
        items.push("【脱人格化が高値】<strong>1日1件でも患者から感謝された瞬間を手帳に記録</strong>する習慣を始めてください。");
      }
      if (axisScores["達成感低下"] >= 15) {
        items.push("【達成感低下が高値】<strong>薬剤師会の研修会・学術発表参加で外部との繋がりを再構築</strong>してください。");
      }

      return items;
    }

    function showResult() {
      document.getElementById("progressFill").style.width = "100%";
      document.getElementById("progressText").textContent = "診断完了";
      document.querySelectorAll(".question").forEach(q => q.classList.remove("active"));
      document.getElementById("result").classList.add("active");

      const axisScores = computeAxisScores();
      const total = axisScores["感情耗尽"] + axisScores["脱人格化"] + axisScores["達成感低下"];
      const overall = judgeOverall(total);

      const card = document.getElementById("scoreCard");
      card.classList.remove("green", "yellow", "orange", "red");
      card.classList.add(overall.card);
      document.getElementById("totalScore").textContent = total;
      document.getElementById("scoreLevel").textContent = overall.label;

      const axisList = document.getElementById("axisList");
      axisList.innerHTML = AXES.map(axis => {
        const s = axisScores[axis];
        const lv = axisLevel(s);
        const pct = Math.round((s / 20) * 100);
        return `
          <div class="axis-item">
            <div class="axis-row">
              <span class="axis-name">${axis}</span>
              <span class="axis-score">${s} / 20点</span>
            </div>
            <div class="bar-outer"><div class="bar-inner lv${lv}" style="width:${pct}%"></div></div>
          </div>
        `;
      }).join("");

      const advice = buildAdvice(axisScores, overall);
      document.getElementById("adviceList").innerHTML = advice.map(a => `<div class="advice-item">${a}</div>`).join("");

      trackToolUsage("completed_" + overall.key);
    }

    function copyResult() {
      const axisScores = computeAxisScores();
      const total = axisScores["感情耗尽"] + axisScores["脱人格化"] + axisScores["達成感低下"];
      const overall = judgeOverall(total);
      const lines = [
        "【薬剤師バーンアウト診断 結果】",
        "",
        `総合スコア: ${total} / 60点`,
        `判定: ${overall.label.replace(/^[^ぁ-んァ-ヶ一-龠]+/, "").trim()}`,
        "",
        "軸別スコア:",
        `  感情耗尽: ${axisScores["感情耗尽"]} / 20点`,
        `  脱人格化: ${axisScores["脱人格化"]} / 20点`,
        `  達成感低下: ${axisScores["達成感低下"]} / 20点`,
        "",
        "対処アドバイス:",
        ...buildAdvice(axisScores, overall).map(a => "  - " + a.replace(/<[^>]+>/g, "")),
        "",
        "診断元: 薬剤師バーンアウト診断 | 薬局無料ツール集",
        "https://yusuketakuma.github.io/pharma-free-tools/pharmacist-burnout-diagnosis.html"
      ].join("\n");

      navigator.clipboard.writeText(lines).then(() => {
        alert("✅ 結果をコピーしました");
        trackCopyAction();
      }).catch(() => {
        alert("コピーに失敗しました。手動でコピーしてください。");
      });
    }

    function restart() {
      currentQuestion = 0;
      answers = new Array(questions.length).fill(null);
      document.getElementById("result").classList.remove("active");
      document.querySelectorAll(".option.selected").forEach(o => o.classList.remove("selected"));
      showQuestion(0);
      trackToolUsage("restart");
    }

    renderQuestions();
    showQuestion(0);
  </script>

</body>
</html>
