        const categoryColors = {
            "調剤業務": "#667eea",
            "服薬指導": "#764ba2",
            "在庫管理": "#f093fb",
            "事務作業": "#f5576c",
            "在宅医療": "#4facfe"
        };
        
        let currentQuestion = 0;
        let answers = [];
        
        function init() {
            loadAnswers();
            renderQuestion();
            updateProgress();
        }
        
        function loadAnswers() {
            const saved = localStorage.getItem('timeVisualizationAnswers');
            if (saved) {
                answers = JSON.parse(saved);
            }
        }
        
        function saveAnswers() {
            localStorage.setItem('timeVisualizationAnswers', JSON.stringify(answers));
        }
        
        function renderQuestion() {
            const container = document.getElementById('questionSection');
            
            if (currentQuestion >= questions.length) {
                showResults();
                return;
            }
            
            const q = questions[currentQuestion];
            const savedAnswer = answers[currentQuestion];
            
            let html = `
                <div class="category-title">${q.category}</div>
                <div class="question">
                    <div class="question-text">Q${currentQuestion + 1}. ${q.question}</div>
                    <div class="options">
            `;
            
            q.options.forEach((opt, idx) => {
                const selected = savedAnswer === idx ? 'selected' : '';
                html += `
                    <label class="option ${selected}" onclick="selectOption(${idx})">
                        <input type="radio" name="q${currentQuestion}" value="${idx}">
                        <span class="option-label">${opt.text}</span>
                    </label>
                `;
            });
            
            html += `
                    </div>
                </div>
                <button class="btn" id="nextBtn" onclick="nextQuestion()" ${savedAnswer === undefined ? 'disabled' : ''}>
                    ${currentQuestion === questions.length - 1 ? '結果を見る' : '次へ'}
                </button>
            `;
            
            container.innerHTML = html;
        }
        
        function selectOption(idx) {
            answers[currentQuestion] = idx;
            saveAnswers();
            
            document.querySelectorAll('.option').forEach((opt, i) => {
                opt.classList.toggle('selected', i === idx);
            });
            
            document.getElementById('nextBtn').disabled = false;
        }
        
        function nextQuestion() {
            currentQuestion++;
            saveAnswers();
            
            if (currentQuestion >= questions.length) {
                showResults();
            } else {
                renderQuestion();
                updateProgress();
            }
        }
        
        function updateProgress() {
            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }
        
        function showResults() {
            trackToolUsage('diagnose');
            document.getElementById('questionSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('progressFill').style.width = '100%';
            
            // Calculate scores
            const categoryScores = {};
            const categoryTimes = {};
            const categoryQuestionCount = {};
            
            questions.forEach((q, idx) => {
                if (!categoryScores[q.category]) {
                    categoryScores[q.category] = 0;
                    categoryTimes[q.category] = 0;
                    categoryQuestionCount[q.category] = 0;
                }
                
                const answer = answers[idx];
                if (answer !== undefined) {
                    categoryScores[q.category] += q.options[answer].score;
                    if (q.options[answer].time) {
                        categoryTimes[q.category] += q.options[answer].time;
                    }
                    categoryQuestionCount[q.category]++;
                }
            });
            
            // Calculate total score
            let totalScore = 0;
            let totalQuestions = 0;
            
            Object.keys(categoryScores).forEach(cat => {
                totalScore += categoryScores[cat];
                totalQuestions += categoryQuestionCount[cat];
            });
            
            const avgScore = Math.round((totalScore / (totalQuestions * 4)) * 100);
            document.getElementById('totalScore').textContent = avgScore;
            
            // Render area scores
            const areaScoresContainer = document.getElementById('areaScores');
            areaScoresContainer.innerHTML = '';
            
            Object.keys(categoryScores).forEach(cat => {
                const avg = Math.round((categoryScores[cat] / (categoryQuestionCount[cat] * 4)) * 100);
                areaScoresContainer.innerHTML += `
                    <div class="area-score">
                        <div class="area-name">${cat}</div>
                        <div class="area-value">${avg}</div>
                    </div>
                `;
            });
            
            // Render time visualization
            const timeContainer = document.getElementById('timeVisualization');
            let timeHtml = '<h3 style="margin-bottom: 20px; color: #333;">📊 業務時間配分（推定1日あたり）</h3>';
            
            const totalTime = Object.values(categoryTimes).reduce((a, b) => a + b, 0);
            
            Object.keys(categoryTimes).forEach(cat => {
                const hours = categoryTimes[cat];
                const percentage = totalTime > 0 ? (hours / totalTime) * 100 : 0;
                
                timeHtml += `
                    <div class="time-bar-container">
                        <div class="time-bar-label">
                            <span>${cat}</span>
                            <span>${hours.toFixed(1)}時間 (${percentage.toFixed(0)}%)</span>
                        </div>
                        <div class="time-bar">
                            <div class="time-bar-fill" style="width: ${percentage}%; background: ${categoryColors[cat]};"></div>
                        </div>
                    </div>
                `;
            });
            
            timeContainer.innerHTML = timeHtml;
            
            // Generate improvements
            const improvements = [];
            
            Object.keys(categoryScores).forEach(cat => {
                const avg = (categoryScores[cat] / (categoryQuestionCount[cat] * 4)) * 100;
                
                if (avg < 50) {
                    if (cat === "調剤業務") {
                        improvements.push("🔄 調剤業務: 自動分包機・一包化導入で調剤時間を短縮");
                        improvements.push("📝 調剤ミス対策: ダブルチェック・バーコード検証を強化");
                    } else if (cat === "服薬指導") {
                        improvements.push("💡 服薬指導: AI薬歴支援ツールで記録時間を短縮");
                        improvements.push("📋 指導統一: チェックリストで質の一貫性を確保");
                    } else if (cat === "在庫管理") {
                        improvements.push("📦 在庫管理: 自動発注システムで発注時間を削減");
                        improvements.push("🔔 供給情報: CloseDi等の自動通知で事前対応");
                    } else if (cat === "事務作業") {
                        improvements.push("📄 事務作業: RPA・AI活用でレセプト・報告書作成を自動化");
                        improvements.push("📞 電話対応: 調剤事務員への委譲を検討");
                    } else if (cat === "在宅医療") {
                        improvements.push("🏠 在宅医療: 訪問準備チェックリストで準備時間を短縮");
                        improvements.push("📝 訪問記録: AI音声入力・自動要約で記録時間を削減");
                    }
                } else if (avg < 75) {
                    if (cat === "調剤業務") {
                        improvements.push("⚡ 調剤効率: 業務フロー見直しでさらなる短縮を検討");
                    } else if (cat === "服薬指導") {
                        improvements.push("🎯 指導品質: AI活用で患者ごとのカスタマイズ指導を強化");
                    } else if (cat === "在庫管理") {
                        improvements.push("📊 在庫分析: デッドストック削減で在庫回転率を向上");
                    } else if (cat === "事務作業") {
                        improvements.push("🤖 事務自動化: 繰り返し作業のRPA化を検討");
                    } else if (cat === "在宅医療") {
                        improvements.push("📱 多職種連携: 電子カルテ情報共有の活用を拡大");
                    }
                }
            });
            
            if (improvements.length === 0) {
                improvements.push("✅ 業務効率化が非常に進んでいます。さらなる改善点を継続的に探索しましょう");
            }
            
            const improvementList = document.getElementById('improvementList');
            improvementList.innerHTML = improvements.map(imp => `<li>${imp}</li>`).join('');
            
            // GA4 event
            gtag('event', 'diagnosis_complete', {
                'event_category': 'time_visualization',
                'event_label': 'score',
                'value': avgScore
            });
        }
        
        function restart() {
            currentQuestion = 0;
            answers = [];
            localStorage.removeItem('timeVisualizationAnswers');
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('questionSection').style.display = 'block';
            renderQuestion();
            updateProgress();
        }
        
        // Initialize
        init();
    </script>
