    let currentQuiz = [];
    let userAnswers = {};
    
    function generateQuiz() {
      const category = document.getElementById('category').value;
      const difficulty = document.getElementById('difficulty').value;
      const count = parseInt(document.getElementById('count').value);
      const focus = document.getElementById('focus').value.trim();
      
      let questions = [];
      
      if (category === 'mixed') {
        const categories = Object.keys(quizBank);
        categories.forEach(cat => {
          if (difficulty === 'mixed') {
            ['basic', 'intermediate', 'advanced'].forEach(diff => {
              questions = questions.concat(quizBank[cat][diff] || []);
            });
          } else {
            questions = questions.concat(quizBank[cat][difficulty] || []);
          }
        });
      } else {
        if (difficulty === 'mixed') {
          ['basic', 'intermediate', 'advanced'].forEach(diff => {
            questions = questions.concat(quizBank[category][diff] || []);
          });
        } else {
          questions = quizBank[category][difficulty] || [];
        }
      }
      
      // Shuffle and select
      questions = shuffleArray(questions).slice(0, count);
      currentQuiz = questions;
      userAnswers = {};
      
      renderQuiz();
      document.getElementById('quizSection').style.display = 'block';
      document.getElementById('scoreSection').style.display = 'none';
    }
    
    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    
    function renderQuiz() {
      const container = document.getElementById('quizContainer');
      container.innerHTML = currentQuiz.map((q, i) => `
        <div class="quiz-card" id="question-${i}">
          <div class="quiz-number">問題 ${i + 1}</div>
          <div class="quiz-question">${q.q}</div>
          <ul class="quiz-options">
            ${q.options.map((opt, j) => `
              <li onclick="selectAnswer(${i}, ${j})" id="opt-${i}-${j}">
                ${String.fromCharCode(65 + j)}. ${opt}
              </li>
            `).join('')}
          </ul>
          <div class="answer-section" id="answer-${i}">
            <span class="answer-label">正解: ${String.fromCharCode(65 + q.answer)}</span>
            <div class="explanation">${q.explanation}</div>
          </div>
        </div>
      `).join('');
    }
    
    function selectAnswer(qIndex, aIndex) {
      userAnswers[qIndex] = aIndex;
      
      // Update UI
      const options = document.querySelectorAll(`#question-${qIndex} .quiz-options li`);
      options.forEach((opt, i) => {
        opt.classList.remove('selected');
        if (i === aIndex) {
          opt.classList.add('selected');
        }
      });
    }
    
    function checkAnswers() {
      let correct = 0;
      
      currentQuiz.forEach((q, i) => {
        const userAnswer = userAnswers[i];
        const correctAnswer = q.answer;
        
        const options = document.querySelectorAll(`#question-${qIndex} .quiz-options li`);
        
        document.querySelectorAll(`#question-${i} .quiz-options li`).forEach((opt, j) => {
          opt.classList.remove('selected');
          if (j === correctAnswer) {
            opt.classList.add('correct');
          } else if (j === userAnswer && j !== correctAnswer) {
            opt.classList.add('incorrect');
          }
        });
        
        if (userAnswer === correctAnswer) {
          correct++;
        }
        
        document.getElementById(`answer-${i}`).style.display = 'block';
      });
      
      // Show score
      const scoreSection = document.getElementById('scoreSection');
      document.getElementById('scoreDisplay').textContent = `${correct}/${currentQuiz.length}`;
      
      const percentage = (correct / currentQuiz.length) * 100;
      let message = '';
      if (percentage >= 80) {
        message = '素晴らしい！合格圏内です！🎉';
      } else if (percentage >= 60) {
        message = '合格ラインです。もう少し頑張りましょう！';
      } else {
        message = '復習が必要です。解説を確認しましょう。';
      }
      document.getElementById('scoreMessage').textContent = message;
      scoreSection.style.display = 'block';
    }
    
    function resetQuiz() {
      userAnswers = {};
      renderQuiz();
      document.getElementById('scoreSection').style.display = 'none';
    }
  </script>
