  <script>
    function calculate() {
      const monthlyDenial = parseFloat(document.getElementById('monthly-denial-amount').value) || 0;
      const currentRate = parseFloat(document.getElementById('current-success-rate').value) || 0;
      const targetRate = parseFloat(document.getElementById('target-success-rate').value) || 0;
      
      const annualDenial = monthlyDenial * 12;
      const currentRecovery = annualDenial * (currentRate / 100);
      const targetRecovery = annualDenial * (targetRate / 100);
      const improvement = targetRecovery - currentRecovery;
      
      document.getElementById('annual-denial').textContent = '¥' + annualDenial.toLocaleString();
      document.getElementById('current-recovery').textContent = '¥' + currentRecovery.toLocaleString();
      document.getElementById('target-recovery').textContent = '¥' + targetRecovery.toLocaleString();
      document.getElementById('improvement').textContent = '¥' + improvement.toLocaleString();
      
      document.getElementById('result').style.display = 'block';
      
      // GA4イベント計測（仮）
      if (typeof gtag !== 'undefined') {
        gtag('event', 'simulation_complete', {
          'event_category': 'claim_denial_simulator',
          'event_label': 'annual_improvement',
          'value': improvement
        });
      }
    }
    
    function trackCTA(ctaType) {
      // GA4イベント計測（仮）
      if (typeof gtag !== 'undefined') {
        gtag('event', 'cta_click', {
          'event_category': 'claim_denial_simulator',
          'event_label': ctaType
        });
      }
    }
  </script>
