  <script>
    const questions = [
      // ロゴ・ビジュアル (4問)
      {
        category: "ロゴ・ビジュアル",
        text: "薬局のロゴや看板デザインは統一されていますか？",
        options: [
          { text: "統一されていない、ロゴがない", score: 1 },
          { text: "ある程度統一されている", score: 2 },
          { text: "完全に統一されたデザインガイドラインがある", score: 4 }
        ]
      },
      {
        category: "ロゴ・ビジュアル",
        text: "薬局内の内装や配色にブランドの世界観が反映されていますか？",
        options: [
          { text: "特に意識していない", score: 1 },
          { text: "一部反映している", score: 2 },
          { text: "一貫した世界観を演出している", score: 4 }
        ]
      },
      {
        category: "ロゴ・ビジュアル",
        text: "名刺、封筒、レシートなどの文具類のデザインは統一されていますか？",
        options: [
          { text: "統一されていない", score: 1 },
          { text: "ロゴを入れている程度", score: 2 },
          { text: "完全に統一されたデザインで品質も高い", score: 4 }
        ]
      },
      {
        category: "ロゴ・ビジュアル",
        text: "薬局の写真やイメージ画像を定期的に更新していますか？",
        options: [
          { text: "更新していない", score: 1 },
          { text: "年に1回程度", score: 2 },
          { text: "定期的（月1回以上）に新しい写真を使用", score: 4 }
        ]
      },
      
      // WEB・SNS (4問)
      {
        category: "WEB・SNS",
        text: "薬局のWEBサイトやGoogleビジネスプロフィールは充実していますか？",
        options: [
          { text: "WEBサイトがない、情報が古い", score: 1 },
          { text: "基本情報は掲載している", score: 2 },
          { text: "最新情報・ブログ・お客様の声など充実", score: 4 }
        ]
      },
      {
        category: "WEB・SNS",
        text: "SNS（Instagram、X、LINE等）を活用していますか？",
        options: [
          { text: "活用していない", score: 1 },
          { text: "アカウントはあるが更新頻度が低い", score: 2 },
          { text: "週2回以上定期的に発信している", score: 4 }
        ]
      },
      {
        category: "WEB・SNS",
        text: "Googleマップの口コミに返信していますか？",
        options: [
          { text: "返信していない", score: 1 },
          { text: "一部返信している", score: 2 },
          { text: "すべての口コミに丁寧に返信している", score: 4 }
        ]
      },
      {
        category: "WEB・SNS",
        text: "薬局の強みや特徴がWEB/SNSで明確に伝わっていますか？",
        options: [
          { text: "特に発信していない", score: 1 },
          { text: "一部伝えている", score: 2 },
          { text: "独自の強みが一目でわかる発信をしている", score: 4 }
        ]
      },
      
      // 接客・サービス (4問)
      {
        category: "接客・サービス",
        text: "薬局独自の接客・サービス基準（挨拶、言葉遣い等）がありますか？",
        options: [
          { text: "特に決めていない", score: 1 },
          { text: "口頭で伝えている程度", score: 2 },
          { text: "マニュアル化・研修を実施している", score: 4 }
        ]
      },
      {
        category: "接客・サービス",
        text: "患者さんからの「ありがとう」や感謝の言葉を記録・共有していますか？",
        options: [
          { text: "記録していない", score: 1 },
          { text: "個人的に記録している", score: 2 },
          { text: "全スタッフで共有・活用している", score: 4 }
        ]
      },
      {
        category: "接客・サービス",
        text: "待ち時間の快適性（待合室、お茶、雑誌等）に配慮していますか？",
        options: [
          { text: "特に配慮していない", score: 1 },
          { text: "基本的な配慮はある", score: 2 },
          { text: "居心地の良い空間づくりを意識している", score: 4 }
        ]
      },
      {
        category: "接客・サービス",
        text: "服薬指導の際、薬局らしさや個性を発揮していますか？",
        options: [
          { text: "一般的な指導のみ", score: 1 },
          { text: "工夫している部分がある", score: 2 },
          { text: "独自の指導スタイル・ツールを活用している", score: 4 }
        ]
      },
      
      // 地域連携 (4問)
      {
        category: "地域連携",
        text: "地域の医療機関との連携・関係構築に力を入れていますか？",
        options: [
          { text: "特に意識していない", score: 1 },
          { text: "必要時のみ連絡をとる", score: 2 },
          { text: "定期的に情報交換・勉強会を実施している", score: 4 }
        ]
      },
      {
        category: "地域連携",
        text: "地域イベントや健康教室などに参加・主催していますか？",
        options: [
          { text: "参加していない", score: 1 },
          { text: "年に1回程度参加している", score: 2 },
          { text: "定期的に主催・積極的に参加している", score: 4 }
        ]
      },
      {
        category: "地域連携",
        text: "近隣住民への健康相談やちょっとした相談を受け付けていますか？",
        options: [
          { text: "受け付けていない", score: 1 },
          { text: "来局時のみ対応している", score: 2 },
          { text: "電話・LINE等でも気軽に相談できる体制がある", score: 4 }
        ]
      },
      {
        category: "地域連携",
        text: "地域の介護施設や福祉施設との連携がありますか？",
        options: [
          { text: "特に連携していない", score: 1 },
          { text: "一部連携している", score: 2 },
          { text: "複数施設と定期的に連携している", score: 4 }
        ]
      },
      
      // 差別化 (4問)
      {
        category: "差別化",
        text: "「この薬局のここが違う」と言える明確な強みがありますか？",
        options: [
          { text: "特にない", score: 1 },
          { text: "いくつかあるが明確に言語化していない", score: 2 },
          { text: "明確に言語化し、発信している", score: 4 }
        ]
      },
      {
        category: "差別化",
        text: "他薬局にはない独自サービスや取り組みがありますか？",
        options: [
          { text: "特にない", score: 1 },
          { text: "1〜2つある", score: 2 },
          { text: "複数の独自サービスがあり、好評を得ている", score: 4 }
        ]
      },
      {
        category: "差別化",
        text: "ターゲットとする患者層や専門分野が明確ですか？",
        options: [
          { text: "特に決めていない", score: 1 },
          { text: "ある程度意識している", score: 2 },
          { text: "明確に定義し、その層に向けた発信をしている", score: 4 }
        ]
      },
      {
        category: "差別化",
        text: "薬局のストーリー（創業の想い、理念など）を伝えていますか？",
        options: [
          { text: "伝えていない", score: 1 },
          { text: "WEBサイト等に記載している", score: 2 },
          { text: "接客や発信でも積極的に伝えている", score: 4 }
        ]
      }
    ];
    
    let currentQuestion = 0;
    let scores = {
      "ロゴ・ビジュアル": 0,
      "WEB・SNS": 0,
      "接客・サービス": 0,
      "地域連携": 0,
      "差別化": 0
    };
    let selectedOption = null;
    
    function renderQuestion() {
      const container = document.getElementById('quiz-container');
      const question = questions[currentQuestion];
      
      container.innerHTML = `
        <div class="question-container active">
          <p class="question-category">${question.category}</p>
          <p class="question-number">Q${currentQuestion + 1}</p>
          <p class="question-text">${question.text}</p>
          <div class="options">
            ${question.options.map((opt, idx) => `
              <div class="option" onclick="selectOption(${idx}, ${opt.score}, '${question.category}')">
                ${opt.text}
              </div>
            `).join('')}
          </div>
          <button class="btn" id="next-btn" onclick="nextQuestion()" disabled>
            ${currentQuestion === questions.length - 1 ? '結果を見る' : '次へ'}
          </button>
        </div>
      `;
      
      updateProgress();
    }
    
    function selectOption(idx, score, category) {
      selectedOption = { idx, score, category };
      
      document.querySelectorAll('.option').forEach((opt, i) => {
        opt.classList.toggle('selected', i === idx);
      });
      
      document.getElementById('next-btn').disabled = false;
    }
    
    function nextQuestion() {
      if (!selectedOption) return;
      
      scores[selectedOption.category] += selectedOption.score;
      selectedOption = null;
      
      currentQuestion++;
      
      if (currentQuestion >= questions.length) {
        showResult();
      } else {
        renderQuestion();
      }
    }
    
    function updateProgress() {
      const progress = (currentQuestion / questions.length) * 100;
      document.getElementById('progress').style.width = `${progress}%`;
      document.getElementById('progress-text').textContent = `${currentQuestion} / ${questions.length}問`;
    }
    
    function showResult() {
      document.getElementById('quiz-container').style.display = 'none';
      document.getElementById('result-container').classList.add('active');
      document.getElementById('progress').style.width = '100%';
      document.getElementById('progress-text').textContent = `${questions.length} / ${questions.length}問完了`;
      
      const totalScore = Object.values(scores).reduce((a, b) => a + b, 0);
      document.getElementById('total-score').textContent = totalScore;
      
      // スコア内訳
      const breakdownHTML = Object.entries(scores).map(([category, score]) => `
        <div class="score-item">
          <p class="score-item-title">${category}</p>
          <p class="score-item-value">${score}/16</p>
        </div>
      `).join('');
      document.getElementById('score-breakdown').innerHTML = breakdownHTML;
      
      // 診断結果
      let diagnosisTitle, diagnosisContent;
      
      if (totalScore >= 60) {
        diagnosisTitle = "🌟 ブランディング優秀";
        diagnosisContent = `
          <li>薬局のブランド力は十分に構築されています</li>
          <li>引き続き一貫した発信とサービス品質の維持を</li>
          <li>さらなる差別化のため、デジタル活用を検討しましょう</li>
        `;
      } else if (totalScore >= 40) {
        diagnosisTitle = "📈 ブランディング伸び代あり";
        diagnosisContent = `
          <li>基本的な取り組みはできています</li>
          <li>特に「${getLowestCategory()}」の強化が効果的です</li>
          <li>SNS発信や患者さんの声の活用を始めましょう</li>
        `;
      } else {
        diagnosisTitle = "💡 ブランディング強化が必要";
        diagnosisContent = `
          <li>まずは「ロゴ・ビジュアル」の統一から始めましょう</li>
          <li>Googleビジネスプロフィールの充実が最優先です</li>
          <li>小さな改善から積み重ねることが大切です</li>
        `;
      }
      
      document.getElementById('diagnosis').innerHTML = `
        <h3>${diagnosisTitle}</h3>
        <ul>${diagnosisContent}</ul>
      `;
      
      // GA4イベント
      if (typeof gtag !== 'undefined') {
        gtag('event', 'quiz_complete', {
          'event_category': 'branding_diagnosis',
          'event_label': 'total_score',
          'value': totalScore
        });
      }
    }
    
    function getLowestCategory() {
      return Object.entries(scores).sort((a, b) => a[1] - b[1])[0][0];
    }
    
    // 初期化
    renderQuestion();
  </script>
