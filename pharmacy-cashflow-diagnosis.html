<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>薬局キャッシュフロー診断 | 薬剤師無料ツール</title>
  <meta name="description" content="薬局の資金繰りリスクを5領域20問で診断。入金管理・在庫圧迫・固定費・請求回収・見える化の弱点を可視化し、改善アクションを提示します。">
  <meta property="og:title" content="薬局キャッシュフロー診断 | 薬剤師無料ツール">
  <meta property="og:description" content="薬局の資金繰りリスクを5領域20問で診断し、改善アクションを提示します。">
  <meta property="og:type" content="website">

  <link rel="canonical" href="https://yusuketakuma.github.io/pharma-free-tools/pharmacy-cashflow-diagnosis.html">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1d4ed8 100%); min-height: 100vh; padding: 20px; color: #1f2937; }
    .container { max-width: 920px; margin: 0 auto; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
    .header { background: linear-gradient(135deg, #1e3a8a, #2563eb); color: white; padding: 36px 28px; text-align: center; }
    .header h1 { font-size: 30px; margin-bottom: 10px; }
    .header p { opacity: .95; line-height: 1.7; }
    .content { padding: 28px; }
    .intro { background: #eff6ff; border-left: 5px solid #2563eb; padding: 18px; border-radius: 10px; margin-bottom: 24px; }
    .intro h2 { color: #1d4ed8; margin-bottom: 10px; font-size: 18px; }
    .intro ul { margin-left: 20px; line-height: 1.8; color: #1e3a8a; }
    .progress-bar { height: 10px; background: #e5e7eb; border-radius: 999px; overflow: hidden; margin-bottom: 24px; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #2563eb, #38bdf8); transition: width .25s ease; }
    .question-container { display: none; }
    .question-container.active { display: block; }
    .category-label { display: inline-block; background: linear-gradient(135deg, #2563eb, #38bdf8); color: white; padding: 8px 14px; border-radius: 999px; font-size: 13px; font-weight: 700; margin-bottom: 14px; }
    .question { font-size: 22px; font-weight: 700; line-height: 1.7; margin-bottom: 18px; }
    .options { display: grid; gap: 12px; }
    .option { border: 2px solid #d1d5db; background: #f9fafb; border-radius: 14px; padding: 16px 18px; cursor: pointer; transition: .2s ease; line-height: 1.6; }
    .option:hover { border-color: #2563eb; background: #eff6ff; }
    .option.selected { border-color: #0ea5e9; background: #e0f2fe; }
    .result { display: none; }
    .score-box { text-align: center; background: linear-gradient(135deg, #eff6ff, #f8fafc); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
    .score-value { font-size: 48px; font-weight: 800; color: #1d4ed8; }
    .score-label { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .score-desc { color: #475569; }
    .breakdown { display: grid; gap: 12px; margin-bottom: 24px; }
    .breakdown-item { background: #f8fafc; border-radius: 12px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
    .breakdown-name { font-weight: 700; }
    .breakdown-score { font-weight: 800; }
    .advice { background: #f8fafc; border-radius: 14px; padding: 20px; }
    .advice h3 { margin-bottom: 12px; color: #0f172a; }
    .advice ul { margin-left: 20px; line-height: 1.8; }
    .nav-buttons { display: flex; justify-content: space-between; gap: 12px; margin-top: 24px; }
    .btn { border: none; border-radius: 10px; padding: 12px 24px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .btn-primary { color: white; background: linear-gradient(135deg, #2563eb, #38bdf8); }
    .btn-secondary { background: #e5e7eb; color: #374151; }
    .cta { margin-top: 24px; background: linear-gradient(135deg, #0f172a, #1e3a8a); color: white; border-radius: 16px; padding: 24px; }
    .cta a { display: inline-block; margin-top: 12px; background: white; color: #1e3a8a; text-decoration: none; padding: 10px 16px; border-radius: 10px; font-weight: 700; }
    .footer { text-align: center; padding: 24px; color: #64748b; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>薬局キャッシュフロー診断</h1>
      <p>資金繰りの詰まりやすいポイントを可視化し、在庫・請求・固定費の改善優先度を整理します。</p>
    </div>
    <div class="content">
      <div class="intro">
        <h2>このツールで分かること</h2>
        <ul>
          <li>どの資金繰り要因がボトルネックになっているか</li>
          <li>入金遅延・在庫圧迫・固定費負担の弱点</li>
          <li>次に打つべき改善アクションの優先順位</li>
        </ul>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
      <div id="questions"></div>
      <div id="result" class="result"></div>
    </div>
    <div class="footer">薬剤師無料ツール集</div>
  </div>

  <script>
    const questions = [
      { c:'入金管理', q:'月次の入金予定を一覧で見える化できていますか？' },
      { c:'入金管理', q:'返戻・査定の発生件数と金額を月次で把握していますか？' },
      { c:'入金管理', q:'入金遅延時の再確認フローが標準化されていますか？' },
      { c:'入金管理', q:'請求締め後から入金確認までの担当分担が明確ですか？' },
      { c:'在庫圧迫', q:'高額在庫・低回転在庫を定期的に抽出していますか？' },
      { c:'在庫圧迫', q:'不動在庫の処理ルール（返品・移動・削減）が明文化されていますか？' },
      { c:'在庫圧迫', q:'発注量は感覚ではなく実績ベースで見直していますか？' },
      { c:'在庫圧迫', q:'期限切迫品の金額影響を毎月把握していますか？' },
      { c:'固定費管理', q:'人件費・家賃・システム費の固定費比率を把握していますか？' },
      { c:'固定費管理', q:'固定費の見直し候補を四半期ごとに洗い出していますか？' },
      { c:'固定費管理', q:'残業・外注・配送など変動費を月次で追えていますか？' },
      { c:'固定費管理', q:'売上減少時のコスト圧縮手順を決めていますか？' },
      { c:'請求回収', q:'在宅・加算・施設請求の漏れを防ぐチェック体制がありますか？' },
      { c:'請求回収', q:'再請求が必要な案件の一覧管理ができていますか？' },
      { c:'請求回収', q:'回収不能・回収遅延の原因を分類して記録していますか？' },
      { c:'請求回収', q:'患者負担金の未収管理ルールが明確ですか？' },
      { c:'見える化', q:'資金繰りを週次または月次で確認する場がありますか？' },
      { c:'見える化', q:'3か月先までの簡易キャッシュフロー予測を作っていますか？' },
      { c:'見える化', q:'利益と現金残高の違いをチームで共有できていますか？' },
      { c:'見える化', q:'資金繰り悪化時の優先対応順位を決めていますか？' }
    ];

    const categories = ['入金管理','在庫圧迫','固定費管理','請求回収','見える化'];
    const categoryAdvice = {
      '入金管理':'返戻・査定・入金遅延の一覧化を先に行い、月次の入金予定表を固定運用にしてください。',
      '在庫圧迫':'高額在庫・低回転在庫・期限切迫品の3点を毎月棚卸しし、削減ルールを決めてください。',
      '固定費管理':'固定費比率と変動費の見える化を行い、削減候補を四半期ごとにレビューしてください。',
      '請求回収':'請求漏れ・再請求・未収金の3つを一覧管理し、担当と期限を明確にしてください。',
      '見える化':'3か月予測と資金繰り会議を定例化し、悪化時の優先順位を明文化してください。'
    };

    let current = 0;
    const answers = [];

    function renderQuestion() {
      const root = document.getElementById('questions');
      const q = questions[current];
      if (!q) return;
      document.getElementById('progress').style.width = ((current / questions.length) * 100) + '%';
      root.innerHTML = `
        <div class="question-container active">
          <span class="category-label">${q.c}</span>
          <div class="question">Q${current + 1}. ${q.q}</div>
          <div class="options">
            <div class="option" onclick="answer(5,this)">かなりできている</div>
            <div class="option" onclick="answer(4,this)">概ねできている</div>
            <div class="option" onclick="answer(3,this)">どちらともいえない</div>
            <div class="option" onclick="answer(2,this)">あまりできていない</div>
            <div class="option" onclick="answer(1,this)">ほとんどできていない</div>
          </div>
        </div>
      `;
    }

    function answer(score, el) {
      document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      answers[current] = score;
      setTimeout(() => {
        current += 1;
        if (current < questions.length) {
          renderQuestion();
        } else {
          showResult();
        }
      }, 180);
    }

    function showResult() {
      const byCategory = {};
      categories.forEach(c => byCategory[c] = []);
      questions.forEach((q, i) => byCategory[q.c].push(answers[i] || 0));
      const scoreMap = {};
      categories.forEach(c => {
        const vals = byCategory[c];
        scoreMap[c] = (vals.reduce((a,b)=>a+b,0) / vals.length).toFixed(1);
      });
      const total = (answers.reduce((a,b)=>a+b,0) / questions.length).toFixed(1);
      let label = '健全';
      let desc = '資金繰り管理は比較的良好です。継続監視と小さな改善を続けてください。';
      if (total < 2.6) {
        label = '要注意';
        desc = '資金繰りボトルネックが複数あります。入金管理と在庫圧迫から優先改善してください。';
      } else if (total < 3.6) {
        label = '改善余地あり';
        desc = '致命的ではないものの、見落とすと資金繰り悪化につながる領域があります。';
      }
      const weakest = categories.slice().sort((a,b)=>parseFloat(scoreMap[a])-parseFloat(scoreMap[b])).slice(0,2);
      document.getElementById('questions').style.display = 'none';
      document.getElementById('progress').style.width = '100%';
      document.getElementById('result').className = 'result';
      document.getElementById('result').style.display = 'block';
      document.getElementById('result').innerHTML = `
        <div class="score-box">
          <div class="score-value">${total}</div>
          <div class="score-label">総合判定: ${label}</div>
          <div class="score-desc">${desc}</div>
        </div>
        <div class="breakdown">
          ${categories.map(c => `<div class="breakdown-item"><span class="breakdown-name">${c}</span><span class="breakdown-score">${scoreMap[c]}</span></div>`).join('')}
        </div>
        <div class="advice">
          <h3>優先改善アクション</h3>
          <ul>
            ${weakest.map(c => `<li><strong>${c}</strong>: ${categoryAdvice[c]}</li>`).join('')}
            <li><strong>次の一手</strong>: 返戻・未収・不動在庫の月次一覧を1枚にまとめ、翌月比較できるようにしてください。</li>
          </ul>
        </div>
        <div class="nav-buttons">
          <button class="btn btn-secondary" onclick="restart()">もう一度診断する</button>
          <button class="btn btn-primary" onclick="copyResult()">結果をコピー</button>
        </div>
        <div class="cta">
          <strong>関連ツール</strong><br>
          収益改善や返戻対策もあわせて確認すると、資金繰りの原因特定が速くなります。<br>
          <a href="index.html">無料ツール一覧を見る →</a>
        </div>
      `;
    }

    function restart() {
      current = 0;
      answers.length = 0;
      document.getElementById('questions').style.display = 'block';
      document.getElementById('result').style.display = 'none';
      renderQuestion();
    }

    function copyResult() {
      const text = '薬局キャッシュフロー診断を実施しました。';
      navigator.clipboard.writeText(text).then(() => alert('結果をコピーしました'));
    }

    renderQuestion();
  </script>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",

    "name": "薬局キャッシュフロー診断",

  }
  </script>
</body>
